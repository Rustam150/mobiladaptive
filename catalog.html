  <header class="page-header"><div class="container"><h1 id="page-title">Каталог</h1></div></header>

  <div class="container catalog-layout">
    <aside class="filters-panel" id="filters-panel">
      <button type="button" class="filters-panel__close" id="filters-close" aria-label="Закрыть">×</button>
      <form id="filters-form">
        <div class="filter-group">
          <label>Цена от</label>
          <input type="number" name="minPrice" placeholder="0" min="0" step="1000" />
        </div>
        <div class="filter-group">
          <label>Цена до</label>
          <input type="number" name="maxPrice" placeholder="1000000" min="0" step="1000" />
        </div>
        <div class="filter-group">
          <label>Страна</label>
          <select name="country"><option value="">Все</option></select>
        </div>
        <div class="filter-group">
          <label>Фабрика</label>
          <select name="factory"><option value="">Все</option></select>
        </div>
        <div class="filter-group">
          <label>Цвет</label>
          <select name="color"><option value="">Все</option></select>
        </div>
        <div class="filter-group">
          <label>Материал</label>
          <select name="material"><option value="">Все</option></select>
        </div>
        <div class="filter-group">
          <label>Наличие</label>
          <select name="inStock">
            <option value="">Все</option>
            <option value="yes">В наличии</option>
            <option value="no">Под заказ</option>
          </select>
        </div>
        <button type="submit" class="btn btn--primary btn--block">Применить</button>
        <button type="button" class="btn btn--outline btn--block mt-2" id="filters-reset">Сбросить</button>
      </form>
    </aside>
    <main class="catalog-main">
      <div id="catalog-categories"></div>
      <div class="catalog-toolbar">
        <button type="button" class="filters-toggle" id="filters-open">Фильтры</button>
        <p id="results-count" style="font-size: 14px; color: var(--text-secondary);"></p>
        <select id="sort-select" aria-label="Сортировка">
          <option value="popular">По популярности</option>
          <option value="price-asc">По цене: сначала дешевле</option>
          <option value="price-desc">По цене: сначала дороже</option>
          <option value="new">По новизне</option>
        </select>
      </div>
      <div class="products-grid" id="catalog-grid" style="margin-top: 24px;"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = getQueryParams();
    const form = document.getElementById('filters-form');

    document.getElementById('catalog-categories').innerHTML = renderCatalogCategories(params.category || '');

    const countries = [...new Set(HERMITAGE.products.map((p) => p.country))];
    const factories = [...new Set(HERMITAGE.products.map((p) => p.factory))];
    const colors = [...new Set(HERMITAGE.products.map((p) => p.color))];
    const materials = [...new Set(HERMITAGE.products.map((p) => p.material.split(',')[0].trim()))];

    const fillSelect = (name, items) => {
      const sel = form.elements[name];
      items.forEach((v) => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        sel.appendChild(o);
      });
    };
    fillSelect('country', countries);
    fillSelect('factory', factories);
    fillSelect('color', colors);
    fillSelect('material', materials);

    if (params.category) {
      const cat = HERMITAGE.categories.find((c) => c.id === params.category);
      if (cat) document.getElementById('page-title').textContent = cat.name;
    }
    if (params.new) document.getElementById('page-title').textContent = 'Новинки';
    if (params.sale) document.getElementById('page-title').textContent = 'Акции';
    if (params.search) document.getElementById('page-title').textContent = `Поиск: ${params.search}`;

    function getFilters() {
      const fd = new FormData(form);
      return {
        category: params.category || '',
        country: fd.get('country') || params.country || '',
        factory: fd.get('factory') || '',
        color: fd.get('color') || '',
        material: fd.get('material') || '',
        inStock: fd.get('inStock') || '',
        minPrice: fd.get('minPrice') || '',
        maxPrice: fd.get('maxPrice') || '',
        new: params.new ? '1' : '',
        sale: params.sale ? '1' : '',
        search: params.search || '',
      };
    }

    function render() {
      const f = getFilters();
      const list = filterProducts(
        { ...f, category: params.category || '' },
        document.getElementById('sort-select').value
      );
      const grid = document.getElementById('catalog-grid');
      grid.innerHTML = list.length
        ? list.map((p) => renderProductCard(p)).join('')
        : '<div class="empty-state" style="grid-column:1/-1;"><p>Товары не найдены</p></div>';
      document.getElementById('results-count').textContent = `${list.length} товаров`;
      initFavButtons(grid);
      initProductCardImages(grid);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('filters-panel').classList.remove('is-open');
      document.querySelector('.filters-backdrop')?.classList.remove('is-open');
      document.body.classList.remove('filters-open');
      render();
    });
    document.getElementById('sort-select').addEventListener('change', render);
    document.getElementById('filters-reset').addEventListener('click', () => {
      form.reset();
      window.location.href = 'catalog.html';
    });
    if (params.country) form.elements.country.value = params.country;
    if (params.new) {
      document.getElementById('page-title').textContent = 'Новинки';
    }
    if (params.sale) {
      document.getElementById('page-title').textContent = 'Акции';
    }
    render();

    // ===== МОБИЛЬНОЕ МЕНЮ КАТЕГОРИЙ (крестик вместо "Назад") =====
    (function initMobileCategories() {
      const categoriesSection = document.getElementById('catalog-categories');
      if (!categoriesSection) return;

      const existingScroll = categoriesSection.querySelector('.catalog-categories__scroll');
      if (!existingScroll) return;

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'categories-menu-toggle';
      toggleBtn.innerHTML = 'Выбрать комнату <span>▼</span>';
      
      const panel = document.createElement('div');
      panel.className = 'categories-panel';
      panel.id = 'mobileCategoriesPanel';
      panel.innerHTML = `
        <button class="categories-panel__close" id="mobileCategoriesClose">✕</button>
        <div class="categories-panel__title">Комнаты</div>
        <div class="categories-panel__grid" id="mobileCategoriesGrid"></div>
      `;
      
      const grid = panel.querySelector('#mobileCategoriesGrid');
      const links = existingScroll.querySelectorAll('.catalog-chip');
      
      links.forEach(link => {
        const name = link.textContent;
        const item = document.createElement('a');
        item.href = link.href;
        item.className = 'categories-panel__item';
        if (link.classList.contains('is-active')) item.classList.add('active');
        item.innerHTML = `<span class="categories-panel__item-name">${name}</span>`;
        item.addEventListener('click', () => panel.classList.remove('open'));
        grid.appendChild(item);
      });
      
      document.body.appendChild(panel);
      categoriesSection.insertBefore(toggleBtn, categoriesSection.firstChild);
      
      toggleBtn.addEventListener('click', () => panel.classList.add('open'));
      document.getElementById('mobileCategoriesClose').addEventListener('click', () => panel.classList.remove('open'));
      panel.addEventListener('click', (e) => { if (e.target === panel) panel.classList.remove('open'); });
    })();
  </script>
</body>
