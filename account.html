<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Личный кабинет — HERMITAGE DECOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page-back="index.html" data-page-title="Личный кабинет">
  <header class="site-header site-header--solid">
    <div class="site-header__inner">
      <button class="nav-toggle" aria-label="Меню"><span></span><span></span><span></span></button>
      <a href="index.html" class="logo">HERMITAGE<span>DECOR</span></a>
      <nav class="site-nav">
        <ul>
          <li><a href="catalog.html">Каталог</a></li>
          <li><a href="favorites.html">Избранное</a></li>
          <li><a href="compare.html">Сравнение</a></li>
          <li><a href="cart.html">Корзина</a></li>
          <li><a href="index.html#footer">Контакты</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <a href="favorites.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span class="badge-count" data-fav-count hidden>0</span></a>
        <a href="cart.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg><span class="badge-count" data-cart-count hidden>0</span></a>
      </div>
    </div>
  </header>

  <header class="page-header"><div class="container"><h1>Личный кабинет</h1></div></header>

  <div class="container section" style="padding-top: 0;" id="account-root"></div>

  <footer class="site-footer"><div class="container footer-copy">© 2026 HERMITAGE DECOR</div></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const root = document.getElementById('account-root');
    const user = Store.user();
    const hash = window.location.hash.slice(1) || (user ? 'profile' : 'login');

    function showPanel(name) {
      root.querySelectorAll('.account-panel').forEach((p) => p.classList.toggle('is-active', p.id === `panel-${name}`));
      root.querySelectorAll('[data-tab-link]').forEach((a) => a.classList.toggle('is-active', a.dataset.tabLink === name));
      window.location.hash = name;
    }

    if (!user) {
      root.innerHTML = `
        <div class="account-tabs">
          <button type="button" data-tab-link="login" class="is-active">Вход</button>
          <button type="button" data-tab-link="register">Регистрация</button>
        </div>
        <div id="panel-login" class="account-panel is-active" style="max-width: 400px;">
          <form id="login-form" class="checkout-form">
            <div class="form-group"><label>Email</label><input type="email" name="email" required /></div>
            <div class="form-group"><label>Пароль</label><input type="password" name="password" required /></div>
            <button type="submit" class="btn btn--primary btn--block">Войти</button>
          </form>
        </div>
        <div id="panel-register" class="account-panel" style="max-width: 400px;">
          <form id="register-form" class="checkout-form">
            <div class="form-group"><label>Имя</label><input type="text" name="firstName" required /></div>
            <div class="form-group"><label>Фамилия</label><input type="text" name="lastName" required /></div>
            <div class="form-group"><label>Телефон</label><input type="tel" name="phone" required /></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required /></div>
            <div class="form-group"><label>Пароль</label><input type="password" name="password" required minlength="6" /></div>
            <button type="submit" class="btn btn--primary btn--block">Зарегистрироваться</button>
          </form>
        </div>`;
      root.querySelectorAll('[data-tab-link]').forEach((btn) => {
        btn.addEventListener('click', () => showPanel(btn.dataset.tabLink));
      });
      if (hash === 'register') showPanel('register');
    } else {
      const orders = Store.orders();
      const favProducts = Store.favorites().map(getProduct).filter(Boolean);

      root.innerHTML = `
        <p style="margin-bottom: 24px;">Здравствуйте, <strong>${user.firstName}</strong></p>
        <div class="account-tabs">
          <button type="button" data-tab-link="profile" class="is-active">Личные данные</button>
          <button type="button" data-tab-link="favorites">Избранное</button>
          <button type="button" data-tab-link="orders">История заявок</button>
        </div>
        <div id="panel-profile" class="account-panel is-active" style="max-width: 480px;">
          <form id="profile-form" class="checkout-form">
            <div class="form-group"><label>Имя</label><input type="text" name="firstName" value="${user.firstName}" required /></div>
            <div class="form-group"><label>Фамилия</label><input type="text" name="lastName" value="${user.lastName}" required /></div>
            <div class="form-group"><label>Телефон</label><input type="tel" name="phone" value="${user.phone || ''}" required /></div>
            <div class="form-group"><label>Email</label><input type="email" value="${user.email}" disabled style="opacity:0.6;" /></div>
            <button type="submit" class="btn btn--primary btn--block">Сохранить</button>
            <button type="button" class="btn btn--outline btn--block mt-2" data-logout>Выйти</button>
          </form>
        </div>
        <div id="panel-favorites" class="account-panel">
          <div class="products-grid" id="account-fav-grid"></div>
        </div>
        <div id="panel-orders" class="account-panel">
          <div id="orders-list"></div>
        </div>`;

      const favGrid = document.getElementById('account-fav-grid');
      if (favProducts.length) {
        favGrid.innerHTML = favProducts.map((p) => renderProductCard(p)).join('');
        initFavButtons(favGrid);
      } else {
        favGrid.innerHTML = '<div class="empty-state"><p>Избранное пусто</p></div>';
      }

      const ordersList = document.getElementById('orders-list');
      if (orders.length) {
        ordersList.innerHTML = orders.map((o) => `
          <div class="order-card">
            <p class="order-card__date">${new Date(o.date).toLocaleString('ru-RU')}</p>
            <p><strong>${o.firstName} ${o.lastName}</strong> · ${o.phone}</p>
            <ul style="margin-top:8px;font-size:14px;color:var(--text-secondary);">
              ${o.items.map((i) => `<li>${i.name}${i.qty > 1 ? ` ×${i.qty}` : ''}</li>`).join('')}
            </ul>
          </div>
        `).join('');
      } else {
        ordersList.innerHTML = '<div class="empty-state"><p>Заявок пока нет</p></div>';
      }

      root.querySelectorAll('[data-tab-link]').forEach((btn) => {
        btn.addEventListener('click', () => showPanel(btn.dataset.tabLink));
      });
      if (['profile', 'favorites', 'orders'].includes(hash)) showPanel(hash);
    }
  </script>
</body>
</html>
